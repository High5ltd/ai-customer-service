name: CI - AI Customer Service
run-name: ${{ github.event.pull_request.title || 'Deployment' }} ${{ github.ref_name }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rag-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rag-frontend
  # K8s repo — chỉnh theo org/repo thực tế (cần secret DEPLOY_PAT)
  K8S_REPO: High5ltd/k8s
  SERVICE_NAME_BACKEND: rag-backend
  SERVICE_NAME_FRONTEND: rag-frontend

jobs:
  changes:
    name: Check for File Changes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.pull_request.merged == true ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    permissions:
      pull-requests: read
      contents: read
    outputs:
      rag: >-
        ${{
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push' ||
          steps.filter.outputs.rag == 'true'
        }}
      ui: >-
        ${{
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push' ||
          steps.filter.outputs.ui == 'true'
        }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rag:
              - 'RAG/**'
              - 'tests/**'
              - 'evals/**'
              - 'src/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'RAG/Dockerfile'
              - '.github/workflows/**'
            ui:
              - 'UI/**'
              - 'UI/Dockerfile'
              - '.github/workflows/**'

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.pull_request.merged == true ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.merge_commit_sha && format('{0}^', github.event.pull_request.merge_commit_sha) || github.event.pull_request.base.sha || 'HEAD^' }}
          head: ${{ github.event.pull_request.merge_commit_sha || github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --debug --only-verified

  test-rag:
    name: Check (RAG) — ${{ matrix.task.name }}
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push' ||
        needs.changes.outputs.rag == 'true') &&
      !(github.event_name == 'pull_request' && github.event.action == 'closed')
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: Ruff (lint)
            command: poetry run ruff check RAG/ tests/
          - name: Ruff (format)
            command: poetry run ruff format --check RAG/ tests/
          - name: Unit tests
            command: poetry run pytest tests/unit/ --cov=RAG --cov-report=term-missing -q
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry (venv)
        run: |
          python -m venv .venv
          .venv/bin/pip install --no-cache-dir poetry==1.8.3
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run ${{ matrix.task.name }}
        run: ${{ matrix.task.command }}

  test-ui:
    name: Check (UI) — ${{ matrix.task.name }}
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push' ||
        needs.changes.outputs.ui == 'true') &&
      !(github.event_name == 'pull_request' && github.event.action == 'closed')
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: ESLint
            command: pnpm run lint
          - name: Types (TypeScript)
            command: pnpm exec tsc --noEmit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: UI
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task.name }}
        working-directory: UI
        run: ${{ matrix.task.command }}

  # Gate: build-push không phụ thuộc test (PR merge/closed bỏ qua test giống mẫu)
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - run: echo "Ready for build/deploy (merge or manual trigger)"

  build-push:
    name: Build and Push Docker
    runs-on: ubuntu-latest
    needs: deploy-gate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_backend: ${{ steps.version.outputs.image_backend }}
      image_frontend: ${{ steps.version.outputs.image_frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        env:
          OWNER_LC: ${{ github.repository_owner }}
        run: |
          SHORT_SHA=$(echo ${{ github.event.pull_request.merge_commit_sha || github.sha }} | cut -c1-7)
          VERSION="staging-${SHORT_SHA}"
          OWNER=$(echo "$OWNER_LC" | tr '[:upper:]' '[:lower:]')
          BACKEND_TAG="${{ env.REGISTRY }}/${OWNER}/rag-backend:${VERSION}"
          FRONTEND_TAG="${{ env.REGISTRY }}/${OWNER}/rag-frontend:${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_backend=${BACKEND_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_frontend=${FRONTEND_TAG}" >> "$GITHUB_OUTPUT"
          echo "BACKEND_IMAGE_LC=${{ env.REGISTRY }}/${OWNER}/rag-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE_LC=${{ env.REGISTRY }}/${OWNER}/rag-frontend" >> "$GITHUB_ENV"
          echo "Version: ${VERSION}"
          echo "Backend: ${BACKEND_TAG}"
          echo "Frontend: ${FRONTEND_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE_LC }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: RAG/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=RAG
          cache-to: type=gha,scope=RAG,mode=max

      - name: Extract metadata (tags, labels) — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE_LC }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: UI/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=UI
          cache-to: type=gha,scope=UI,mode=max

  trigger-deploy:
    name: Trigger Auto Deploy
    needs: build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Trigger deployment — backend
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: ${{ env.K8S_REPO }}
          event-type: deploy-image
          client-payload: |
            {
              "service": "${{ env.SERVICE_NAME_BACKEND }}",
              "version": "${{ needs.build-push.outputs.version }}",
              "image": "${{ needs.build-push.outputs.image_backend }}",
              "environment": "staging"
            }

      - name: Trigger deployment — frontend
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: ${{ env.K8S_REPO }}
          event-type: deploy-image
          client-payload: |
            {
              "service": "${{ env.SERVICE_NAME_FRONTEND }}",
              "version": "${{ needs.build-push.outputs.version }}",
              "image": "${{ needs.build-push.outputs.image_frontend }}",
              "environment": "staging"
            }

      - name: Summary
        run: |
          echo "### Deployment triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ needs.build-push.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend image | ${{ needs.build-push.outputs.image_backend }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend image | ${{ needs.build-push.outputs.image_frontend }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | staging |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Monitor deployment in the [K8s config repo](https://github.com/${{ env.K8S_REPO }}/actions)." >> "$GITHUB_STEP_SUMMARY"
